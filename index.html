<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La mar sabor peruano — Comandas</title>
<style>
:root{--deep:#0b2b2e;--teal:#16484b;--foam:#f4efe4;--sand:#e7ddc6;--coral:#d8662f;--coral-dark:#b94f1f;--gold:#c8973f;--ok:#3f7d52;--warn:#c8973f;--late:#b3402f;--line:rgba(11,43,46,0.12);--barra:#4a2d7a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--foam);color:var(--deep);min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;}
#launcher{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;}
.l-mark{font-size:12px;text-transform:uppercase;letter-spacing:0.18em;color:var(--coral-dark);font-weight:700;margin-bottom:8px;}
.l-title{font-size:36px;font-weight:700;color:var(--deep);text-align:center;margin-bottom:6px;}
.l-sub{color:var(--teal);opacity:0.7;margin-bottom:32px;font-size:15px;text-align:center;}
.l-grid{display:flex;flex-direction:column;gap:12px;width:100%;max-width:370px;}
.l-card{background:white;border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px;text-align:left;}
.l-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(11,43,46,0.10);}
.l-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.l-card.mesero .l-icon{background:#fdeee1;}.l-card.cocina .l-icon{background:#e9f0ea;}.l-card.barra .l-icon{background:#ede8f5;}.l-card.admin .l-icon{background:#eee7d4;}
.l-text strong{display:block;font-size:15px;font-weight:700;}.l-text span{font-size:12px;color:var(--teal);opacity:0.7;}
.l-foot{margin-top:24px;font-size:12px;color:var(--teal);opacity:0.45;text-align:center;}
.topbar{background:var(--deep);color:var(--foam);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar.barra-top{background:var(--barra);}
.topbar-back{color:var(--foam);opacity:0.7;font-size:13px;}
.topbar-brand{font-size:16px;font-weight:700;}
.topbar-role{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;background:rgba(244,239,228,0.12);padding:5px 10px;border-radius:20px;}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#666;display:inline-block;margin-right:5px;}.conn-dot.on{background:#4caf50;}
#mesero-view{padding-bottom:130px;}
.sec-label{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--coral-dark);font-weight:700;padding:14px 16px 7px;}
.table-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 16px 8px;}
.tbl-btn{background:white;border:2px solid var(--line);border-radius:10px;padding:10px 0 6px;text-align:center;font-weight:700;font-size:15px;color:var(--deep);line-height:1.2;}
.tbl-btn.occupied{background:#fff3ec;border-color:var(--coral);color:var(--coral-dark);}
.tbl-btn.active{background:var(--deep);color:var(--foam);border-color:var(--deep);}
.tbl-btn.occupied.active{background:var(--coral-dark);color:white;border-color:var(--coral-dark);}
.tbl-btn.ready{background:#e6efe9;border-color:var(--ok);color:var(--ok);}
.tbl-sub{display:block;font-size:9px;font-weight:600;opacity:0.65;text-transform:uppercase;margin-top:2px;}
.tbl-legend{display:flex;gap:12px;padding:0 16px 8px;font-size:11px;color:var(--teal);opacity:0.65;flex-wrap:wrap;}
.tbl-legend span{display:flex;align-items:center;gap:5px;}
.tbl-legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}
.tbl-legend i.lib{background:white;border:1.5px solid var(--line);}.tbl-legend i.occ{background:#fff3ec;border:1.5px solid var(--coral);}.tbl-legend i.rdy{background:#e6efe9;border:1.5px solid var(--ok);}
.hora-box{background:white;border:2px solid var(--gold);border-radius:12px;margin:0 16px 12px;padding:13px;}
.hora-box-title{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:9px;}
.hora-opts{display:flex;gap:7px;flex-wrap:wrap;}
.hora-opt{padding:7px 12px;border-radius:20px;font-size:12px;font-weight:600;background:var(--foam);border:1.5px solid var(--line);color:var(--deep);}
.hora-opt.sel{background:var(--gold);border-color:var(--gold);color:white;}
.hora-custom{display:flex;align-items:center;gap:8px;margin-top:9px;}
.hora-custom input{border:1.5px solid var(--line);border-radius:8px;padding:7px 9px;font-size:14px;width:105px;background:var(--foam);}
.hora-custom label{font-size:12px;color:var(--teal);}
.edit-banner{background:var(--coral);color:white;padding:11px 16px;margin:0 16px 10px;border-radius:11px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;}
.edit-banner span{opacity:0.85;font-weight:500;}
.edit-box{background:white;border:2px solid var(--coral);border-radius:12px;margin:0 16px 12px;overflow:hidden;}
.edit-box-head{background:#fff3ec;padding:9px 13px;font-size:12px;font-weight:700;color:var(--coral-dark);display:flex;justify-content:space-between;}
.edit-item{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-top:1px solid var(--line);}
.edit-item-name{font-size:13px;font-weight:600;flex:1;}
.edit-item-price{font-size:11px;color:var(--teal);opacity:0.6;margin-top:1px;}
.especial-box{background:white;border:2px dashed var(--coral);border-radius:12px;margin:0 16px 12px;padding:13px;}
.especial-title{font-size:11px;font-weight:700;color:var(--coral-dark);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:9px;}
.especial-row{display:flex;gap:8px;margin-bottom:0;}
.especial-input{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:9px 12px;font-size:14px;background:var(--foam);}
.especial-cant{width:60px;border:1.5px solid var(--line);border-radius:8px;padding:9px 8px;font-size:14px;background:var(--foam);text-align:center;}
.especial-add-btn{background:var(--coral);color:white;padding:9px 14px;border-radius:8px;font-weight:700;font-size:13px;}
.especial-item{display:flex;justify-content:space-between;align-items:center;background:#fff3ec;border:1px solid var(--coral);border-radius:9px;padding:10px 13px;margin:0 16px 7px;}
.especial-item-name{font-weight:600;font-size:14px;color:var(--coral-dark);}
.especial-item-sub{font-size:11px;color:var(--coral-dark);opacity:0.7;margin-top:2px;}
.alerta-listo{background:var(--ok);color:white;margin:0 16px 12px;border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;}
.alerta-listo-icon{font-size:24px;}
.alerta-listo-text strong{display:block;font-size:15px;font-weight:800;}
.alerta-listo-text span{font-size:12px;opacity:0.85;}
.cat-title{font-size:13px;color:var(--teal);font-weight:700;padding:13px 16px 5px;display:flex;align-items:center;gap:8px;}
.cat-title::after{content:"";flex:1;height:1px;background:var(--line);}
.cat-title.bev{color:var(--barra);}
.dish-row{display:flex;justify-content:space-between;align-items:center;background:white;border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:0 16px 7px;}
.dish-row.bev-dish{border-left:3px solid var(--barra);}
.dish-row.agotado{opacity:0.45;}
.dish-name{font-weight:600;font-size:14px;}
.dish-price{font-size:12px;color:var(--teal);opacity:0.65;margin-top:2px;}
.bev-tag{font-size:10px;background:#ede8f5;color:var(--barra);padding:2px 7px;border-radius:10px;font-weight:700;display:inline-block;margin-top:2px;}
.inv-badge{font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;margin-left:5px;}
.inv-badge.ok{background:#e6efe9;color:var(--ok);}.inv-badge.low{background:#fdf3da;color:var(--gold);}.inv-badge.out{background:#fdeee1;color:var(--late);}
.precio-var-badge{font-size:11px;background:#fdf3da;color:#8a6a1a;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:6px;}
.dish-add{width:32px;height:32px;border-radius:50%;background:var(--coral);color:white;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dish-add.bev-add{background:var(--barra);}
.qty-row{display:flex;align-items:center;gap:9px;}
.qty-row button{width:28px;height:28px;border-radius:50%;background:var(--sand);color:var(--deep);font-size:16px;font-weight:700;}
.qty-row span{min-width:14px;text-align:center;font-weight:700;}
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--deep);color:var(--foam);padding:12px 16px;box-shadow:0 -4px 16px rgba(0,0,0,0.15);}
.cart-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cart-info-name{font-size:15px;font-weight:700;}.cart-info-sub{font-size:12px;opacity:0.65;margin-top:2px;}
.cart-btns{display:flex;gap:8px;}
.cbtn{flex:1;padding:11px 0;border-radius:10px;font-weight:700;font-size:13px;text-align:center;color:white;}
.cbtn.food{background:var(--coral);}.cbtn.bev{background:var(--barra);}.cbtn.both{background:var(--ok);}.cbtn.save{background:var(--ok);}
.cbtn:disabled{background:#5b6b69;color:rgba(244,239,228,0.4);cursor:not-allowed;}
.toast{position:fixed;top:65px;left:50%;transform:translateX(-50%);background:var(--ok);color:white;padding:11px 20px;border-radius:30px;font-weight:700;font-size:13px;z-index:200;box-shadow:0 6px 18px rgba(0,0,0,0.2);}
.kds-wrap{padding:16px;}
.kds-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;}
.stat-pill{background:white;border-radius:12px;padding:9px 14px;border:1px solid var(--line);min-width:80px;}
.stat-num{font-size:24px;font-weight:800;line-height:1;}.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--teal);opacity:0.7;margin-top:2px;}
.print-all-btn{background:var(--teal);color:white;padding:9px 16px;border-radius:8px;font-weight:700;font-size:13px;}
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.kanban.two{grid-template-columns:repeat(2,1fr);}
.k-col-title{font-size:12px;text-transform:uppercase;letter-spacing:0.07em;color:var(--teal);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.k-count{background:var(--teal);color:white;border-radius:20px;font-size:11px;padding:2px 8px;}
.order-card{background:white;border-radius:12px;padding:13px 13px 13px 17px;margin-bottom:11px;border:2px solid var(--line);position:relative;overflow:hidden;}
.order-card.warn{border-color:var(--warn);}.order-card.late{border-color:var(--late);background:#fdf4f2;}.order-card.programado{border-color:var(--gold);background:#fdfaf0;}
.oc-bar{position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--ok);}
.order-card.warn .oc-bar{background:var(--warn);}.order-card.late .oc-bar{background:var(--late);}.order-card.programado .oc-bar{background:var(--gold);}
.oc-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.oc-mesa{font-size:19px;font-weight:800;}.oc-timer{font-size:13px;font-weight:800;}
.oc-timer.ok{color:var(--ok);}.oc-timer.warn{color:var(--warn);}.oc-timer.late{color:var(--late);}.oc-timer.prog{color:var(--gold);}
.oc-prog{display:inline-flex;align-items:center;gap:4px;background:#fdf3da;border:1px solid var(--gold);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;color:#8a6a1a;margin-bottom:6px;}
.oc-meta{font-size:11px;color:var(--teal);opacity:0.6;margin-bottom:7px;}
.oc-item{font-size:13px;padding:2px 0;}.oc-note{font-size:11px;color:var(--coral-dark);font-style:italic;padding-left:11px;}
.oc-actions{margin-top:9px;display:flex;gap:6px;flex-wrap:wrap;}
.oc-actions button{flex:1;min-width:70px;padding:8px 0;border-radius:8px;font-weight:700;font-size:11px;text-transform:uppercase;}
.btn-start{background:var(--deep);color:var(--foam);}.btn-ready{background:var(--ok);color:white;}.btn-deliver{background:var(--coral);color:white;}.btn-bev-ready{background:var(--barra);color:white;}
.btn-print-cmd{background:var(--sand);color:var(--deep);border:1px solid var(--line);}
.btn-cancel{background:transparent;color:var(--late);border:1.5px solid var(--late);}
.empty-col{text-align:center;color:var(--teal);opacity:0.4;font-size:13px;padding:26px 0;border:1.5px dashed var(--line);border-radius:12px;}
#admin-view{max-width:980px;margin:0 auto;padding:16px;}
.tabs{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.tab-btn{padding:8px 14px;border-radius:30px;font-size:13px;font-weight:700;background:white;border:1px solid var(--line);color:var(--teal);}
.tab-btn.active{background:var(--deep);color:var(--foam);border-color:var(--deep);}
.reset-btn{margin-left:auto;background:transparent;border:1px solid var(--late);color:var(--late);padding:7px 12px;border-radius:8px;font-size:12px;font-weight:700;}
.a-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px;}
.a-card{background:white;border-radius:12px;padding:15px;border:1px solid var(--line);}
.a-num{font-size:26px;font-weight:800;}.a-lbl{font-size:12px;color:var(--teal);opacity:0.65;margin-top:3px;}
.a-title{font-size:16px;font-weight:700;margin-bottom:11px;}
table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;border:1px solid var(--line);}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--teal);opacity:0.7;padding:10px 12px;border-bottom:1px solid var(--line);}
td{padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px;}tr:last-child td{border-bottom:none;}
.chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;}
.chip.pendiente{background:#fdeee1;color:var(--coral-dark);}.chip.preparacion{background:#fdf3da;color:var(--gold);}
.chip.listo{background:#e6efe9;color:var(--ok);}.chip.entregado{background:#e9e9e9;color:#666;}.chip.cancelado{background:#f5e0e0;color:var(--late);}
.mesas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px;}
.mesa-card{background:white;border:2px solid var(--line);border-radius:12px;padding:13px;cursor:pointer;}
.mesa-card:hover{box-shadow:0 4px 14px rgba(11,43,46,0.10);}.mesa-card.ocupada{border-color:var(--coral);}.mesa-card.libre{opacity:0.4;cursor:default;}
.mc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.mc-num{font-size:17px;font-weight:800;}
.mc-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;}
.mc-chip.ocupada{background:#fff3ec;color:var(--coral-dark);}.mc-chip.libre{background:#e9e9e9;color:#888;}
.mc-total{font-size:17px;font-weight:800;color:var(--ok);}
.mc-info{font-size:11px;color:var(--teal);opacity:0.65;margin-top:3px;}
.detalle-back{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--coral-dark);font-size:14px;margin-bottom:13px;cursor:pointer;}
.pago-selector{display:flex;gap:8px;margin-bottom:12px;}
.pago-btn{flex:1;padding:10px;border-radius:9px;font-weight:700;font-size:13px;border:2px solid var(--line);background:white;color:var(--teal);}
.pago-btn.active{border-color:var(--deep);background:var(--deep);color:white;}
.propina-toggle{display:flex;align-items:center;gap:10px;background:#fdf3da;border:1.5px solid var(--gold);border-radius:10px;padding:11px 14px;margin-bottom:10px;cursor:pointer;}
.propina-toggle input{width:18px;height:18px;accent-color:var(--gold);cursor:pointer;}
.propina-toggle label{font-size:14px;font-weight:700;color:#8a6a1a;cursor:pointer;}
.factura-wrap{background:white;border-radius:12px;border:1px solid var(--line);padding:22px;max-width:100%;}
.factura-header{text-align:center;margin-bottom:16px;border-bottom:2px dashed #000;padding-bottom:13px;}
.factura-logo{font-size:22px;font-weight:800;color:var(--deep);}
.factura-sub{font-size:12px;color:#000;font-weight:600;margin-top:3px;}
.factura-meta{font-size:12px;color:#000;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.fac-table{width:100%;border-collapse:collapse;margin-bottom:13px;table-layout:fixed;}
.fac-table th{font-size:10px;text-transform:uppercase;color:#000;font-weight:800;padding:4px 2px;border-bottom:2px solid #000;text-align:left;word-break:break-word;}
.fac-table th:last-child,.fac-table td:last-child{text-align:right;}
.fac-table th:first-child,.fac-table td:first-child{width:45%;}
.fac-table th:nth-child(2),.fac-table td:nth-child(2){width:10%;text-align:center;}
.fac-table th:nth-child(3),.fac-table td:nth-child(3){width:22%;text-align:right;}
.fac-table th:nth-child(4),.fac-table td:nth-child(4){width:23%;text-align:right;}
.fac-table td{padding:5px 2px;font-size:12px;border-bottom:1px solid #eee;word-break:break-word;}
.fac-cat-row td{font-size:10px;font-weight:800;color:#000;padding-top:10px;text-transform:uppercase;border-bottom:none;}
.fac-totales{border-top:2px dashed #000;padding-top:9px;}
.fac-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:#000;font-weight:700;}
.fac-row.prop-note{font-size:11px;font-style:italic;font-weight:500;}
.fac-row.total{font-size:20px;font-weight:900;border-top:2px solid #000;margin-top:8px;padding-top:9px;}
.fac-footer{text-align:center;margin-top:16px;padding-top:13px;border-top:2px dashed #000;font-size:12px;color:#000;font-weight:600;}
.fac-footer strong{display:block;font-size:14px;color:#000;font-weight:800;margin-bottom:3px;}
.print-actions{display:flex;gap:10px;margin-top:14px;max-width:420px;margin-left:auto;margin-right:auto;}
.print-actions button{flex:1;padding:12px;border-radius:10px;font-weight:700;font-size:13px;}
.btn-print-fac{background:var(--deep);color:white;}.btn-volver{background:white;border:1.5px solid var(--line);color:var(--deep);}
.inv-wrap{margin-top:4px;}
.inv-cat-title{font-size:14px;font-weight:800;color:var(--teal);padding:13px 0 6px;border-bottom:1px solid var(--line);margin-bottom:8px;}
.inv-table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;border:1px solid var(--line);margin-bottom:16px;}
.inv-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--teal);opacity:0.7;padding:10px 12px;border-bottom:1px solid var(--line);}
.inv-table td{padding:9px 12px;border-bottom:1px solid var(--line);font-size:13px;}
.inv-table tr:last-child td{border-bottom:none;}
.inv-table input[type=number]{border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:13px;width:70px;text-align:center;background:var(--foam);}
.inv-save-btn{background:var(--ok);color:white;padding:10px 20px;border-radius:8px;font-weight:700;font-size:14px;margin-top:12px;}
.cierre-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.cierre-card{background:white;border-radius:12px;padding:16px;border:1px solid var(--line);text-align:center;}
.cierre-card .num{font-size:22px;font-weight:800;color:var(--ok);}
.cierre-card .lbl{font-size:12px;color:var(--teal);opacity:0.7;margin-top:4px;}
.cierre-card.gran-total{border-color:var(--deep);background:var(--deep);}
.cierre-card.gran-total .num{color:white;font-size:26px;}
.cierre-card.gran-total .lbl{color:rgba(244,239,228,0.7);}
.cierre-btn{background:var(--teal);color:white;padding:10px 20px;border-radius:9px;font-weight:700;font-size:13px;margin-top:4px;}
.filtro-fecha{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filtro-fecha input{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;background:white;}
.filtro-fecha button{background:var(--deep);color:white;padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;}
.num-fac-row{font-size:12px;font-weight:700;color:var(--teal);margin-bottom:8px;}
#fac-print{display:none;}

async function crearFacturaAlegra(mesa, items, subtotal, propina, total, metodoPago){
  // Construir ítems para Alegra
  const itemsAlegra=items.map(it=>({
    id:null,
    description:it.name,
    price:it.price||0,
    quantity:it.qty,
    tax:[]
  }));

  // Si hay propina agregarla como ítem
  if(propina>0){
    itemsAlegra.push({
      id:null,
      description:"Propina voluntaria (10%)",
      price:propina,
      quantity:1,
      tax:[]
    });
  }

  const paymentMethod=metodoPago==="tarjeta"?"credit-card":metodoPago==="transferencia"?"transfer":"cash";

  const body={
    date:new Date().toISOString().slice(0,10),
    dueDate:new Date().toISOString().slice(0,10),
    observations:"Mesa "+mesa+" · Sistema de comandas La mar sabor peruano",
    items:itemsAlegra,
    paymentMethod:paymentMethod,
    client:{name:"Consumidor Final",identification:"222222222222"}
  };

  try{
    const resp=await fetch(ALEGRA_URL+"invoices",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":ALEGRA_AUTH
      },
      body:JSON.stringify(body)
    });
    const data=await resp.json();
    if(data.id){
      return{ok:true,id:data.id,number:data.numberTemplate?data.numberTemplate.fullNumber:data.id};
    } else {
      console.error("Error Alegra:",data);
      return{ok:false,error:JSON.stringify(data)};
    }
  } catch(e){
    console.error("Error conectando Alegra:",e);
    return{ok:false,error:e.message};
  }
}

// ── BEEP ──
function playBeep(){
  try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(0.5,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.start();o.stop(c.currentTime+0.3);setTimeout(()=>{try{const o2=c.createOscillator();const g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.frequency.value=1100;g2.gain.setValueAtTime(0.4,c.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);o2.start();o2.stop(c.currentTime+0.2);}catch(e){}},350);}catch(e){}}

// ── Helpers ──
function fmtCOP(n){return n==null?"según disp.":"$"+n.toLocaleString("es-CO");}

function getMeta(id){const item=MENU.flatMap(g=>g.items).find(i=>i.id===id)||null;if(item&&item.price===null&&preciosVar[id]!=null)return{...item,price:preciosVar[id]};return item;}
function getOccupied(){const s=new Set();ordersCache.filter(o=>o.status!=="entregado"&&o.status!=="cancelado").forEach(o=>s.add(o.table));return s;}
function getReadyTables(){const s=new Set();ordersCache.filter(o=>o.status==="listo").forEach(o=>s.add(o.table));return s;}
function getEditables(t){return ordersCache.filter(o=>o.table===t&&(o.status==="pendiente"||o.status==="preparacion"));}
function timerInfo(o){if(o.scheduledTime){return{level:"programado",remaining:null,elapsed:minSince(o.createdAt),prog:o.scheduledTime};}const e=minSince(o.createdAt),r=PREP_MIN-e;return{level:r>15?"ok":r>0?"warn":"late",remaining:r,elapsed:e};}

// ── Firebase ──
function startListeners(onOrders){
  if(fbOrderListener)db.ref("orders").off("value",fbOrderListener);
  if(fbInvListener)db.ref("inventory").off("value",fbInvListener);
  fbOrderListener=db.ref("orders").on("value",snap=>{
    const d=snap.val()||{};
    const newCache=Object.values(d).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    if(currentView==="cocina"||currentView==="barra"){
      newCache.forEach(o=>{if(!prevOrderIds.has(o.id)&&o.status==="pendiente")playBeep();});
    }
    if(currentView==="mesero"){
      newCache.forEach(o=>{
        if(o.status==="listo"&&!prevListoIds.has(o.id)&&o.table===selectedTable){
          showToast("🔔 ¡Pedido listo — Mesa "+o.table+"!","#3f7d52");
        }
      });
    }
    prevOrderIds=new Set(newCache.map(o=>o.id));
    prevListoIds=new Set(newCache.filter(o=>o.status==="listo").map(o=>o.id));
    ordersCache=newCache;
    onOrders();
  });
  db.ref("precios_var").on("value",snap=>{preciosVar=snap.val()||{};if(currentView==="mesero")renderMesero();});
  fbInvListener=db.ref("inventory").on("value",snap=>{inventory=snap.val()||{};if(currentView==="mesero")renderMesero();});
  db.ref(".info/connected").on("value",snap=>{const on=snap.val();["m-dot","c-dot","b-dot","a-dot"].forEach(id=>setDot(id,on));});
}
function stopListeners(){if(fbOrderListener){db.ref("orders").off("value",fbOrderListener);fbOrderListener=null;}if(fbInvListener){db.ref("inventory").off("value",fbInvListener);fbInvListener=null;}}
function getNextFacturaNum(){return new Promise(res=>{db.ref("factura_counter").transaction(cur=>(cur||0)+1,(_,__,snap)=>res(snap.val()));});}

// ── Navegación ──
function showView(v){
  stopListeners();
  ["launcher","mesero-view","cocina-view","barra-view","admin-view"].forEach(id=>document.getElementById(id).style.display="none");
  currentView=v;
  if(v==="launcher"){document.getElementById("launcher").style.display="flex";}
  else if(v==="mesero"){document.getElementById("mesero-view").style.display="block";cart={};selectedTable=null;editingOrderId=null;scheduledTime=null;especialesCart=[];startListeners(renderMesero);}
  else if(v==="cocina"){document.getElementById("cocina-view").style.display="block";startListeners(renderCocina);}
  else if(v==="barra"){document.getElementById("barra-view").style.display="block";startListeners(renderBarra);}
  else if(v==="admin"){document.getElementById("admin-view").style.display="block";detalleMesa=null;startListeners(renderAdmin);}
}

  if(btnC&&btnB){

function updateCartBar(){
  const entries=Object.entries(cart);
  const total=entries.reduce((s,[,c])=>s+(c.price||0)*c.qty,0);
  const count=entries.reduce((s,[,c])=>s+c.qty,0)+especialesCart.reduce((s,e)=>s+e.qty,0);
  const hasBev=entries.some(([id])=>isBev(id));
  const hasFood=entries.some(([id])=>!isBev(id))||especialesCart.length>0;
  document.getElementById("cart-mesa-lbl").textContent=selectedTable?(editingOrderId?"✏️ Editando Mesa "+selectedTable:"Mesa "+selectedTable):"Selecciona una mesa";
  document.getElementById("cart-items-lbl").textContent=count+" ítem"+(count!==1?"s":"")+" · "+fmtCOP(total)+(scheduledTime?" · 🕐 "+scheduledTime:"");
  const btns=document.getElementById("cart-btns");
  if(!selectedTable||count===0){btns.innerHTML='<button class="cbtn" disabled>Enviar</button>';return;}
  if(editingOrderId){btns.innerHTML='<button class="cbtn save" onclick="saveEdit()">Guardar cambios</button>';return;}
  if(hasBev&&hasFood){btns.innerHTML='<button class="cbtn both" onclick="mostrarResumen()">Ver resumen y enviar</button>';}
  else if(hasBev){btns.innerHTML='<button class="cbtn bev" onclick="mostrarResumen()">Ver resumen y enviar</button>';}
  else{btns.innerHTML='<button class="cbtn food" onclick="mostrarResumen()">Ver resumen y enviar</button>';}
}

function mostrarResumen(){
  const entries=Object.entries(cart);
  if(!selectedTable||(entries.length===0&&especialesCart.length===0))return;
  const total=entries.reduce((s,[,c])=>s+(c.price||0)*c.qty,0);
  const hasBev=entries.some(([id])=>isBev(id));
  const hasFood=entries.some(([id])=>!isBev(id))||especialesCart.length>0;
  let btnCls=hasBev&&hasFood?"both":hasBev?"bev":"food";
  let btnTxt=hasBev&&hasFood?"Enviar a cocina + barra":hasBev?"Enviar a barra 🍹":"Enviar a cocina";
  let h='<div class="modal-overlay" id="resumen-modal" onclick="cerrarResumen(event)">';
  h+='<div class="modal-box">';
  h+='<div class="modal-title">Resumen del pedido <span class="modal-close" onclick="cerrarResumenBtn()">✕</span></div>';
  h+=`<div style="font-size:13px;font-weight:700;color:var(--teal);margin-bottom:12px;">Mesa ${selectedTable}${scheduledTime?" · 🕐 Para las "+scheduledTime:""}</div>`;
  // Ítems del menú
  entries.forEach(([id,c])=>{
    const m=getMeta(id)||{name:c.name,price:c.price};
    const bev=isBev(id);
    h+=`<div class="modal-item"><div style="flex:1"><div class="modal-item-name">${c.qty}× ${m.name}${bev?' <small style="color:var(--barra)">🍹</small>':""}</div><div class="modal-item-price">${fmtCOP((m.price||0)*c.qty)}</div></div></div>`;
  });
  // Especiales
  especialesCart.forEach(e=>{
    h+=`<div class="modal-esp"><div class="modal-esp-name">${e.qty}× ${e.nombre}</div><div class="modal-esp-sub">Precio lo pone el admin al facturar</div></div>`;
  });
  // Nota de mesa
  if(notaMesa.trim()){
    h+=`<div class="modal-nota">📝 Nota: ${notaMesa}</div>`;
  }
  h+='<div class="modal-divider"></div>';
  h+=`<div class="modal-total"><span>Total estimado</span><span>${fmtCOP(total)}</span></div>`;
  h+=`<button class="modal-send-btn ${btnCls}" onclick="sendOrder()">${btnTxt}</button>`;
  h+='</div></div>';
  document.body.insertAdjacentHTML('beforeend', h);
}
function cerrarResumen(e){if(e.target.id==="resumen-modal")cerrarResumenBtn();}
function cerrarResumenBtn(){const m=document.getElementById("resumen-modal");if(m)m.remove();}

function sendOrder(){
  const entries=Object.entries(cart);
  if(!selectedTable||(entries.length===0&&especialesCart.length===0))return;
  const allItems=entries.map(([id,c])=>{const m=getMeta(id);return{id,name:m?m.name:c.name,price:c.price||0,qty:c.qty,note:c.note||"",bev:isBev(id)};});
  especialesCart.forEach(e=>{allItems.push({id:"esp_"+Date.now()+"_"+Math.random().toString(36).slice(2,5),name:e.nombre,price:null,qty:e.qty,note:"",bev:e.dest==="barra",especial:true});});
  const base={table:selectedTable,createdAt:new Date().toISOString(),status:"pendiente",scheduledTime:scheduledTime||null,notaMesa:notaMesa||null};
  const food=allItems.filter(it=>!it.bev),bev=allItems.filter(it=>it.bev);
  const ps=[];
  if(food.length>0)ps.push(db.ref("orders/ord_"+Date.now()+"f").set({...base,id:"ord_"+Date.now()+"f",items:food,type:"cocina"}));
  if(bev.length>0)ps.push(db.ref("orders/ord_"+(Date.now()+1)+"b").set({...base,id:"ord_"+(Date.now()+1)+"b",items:bev,type:"barra"}));
  const updates={};allItems.forEach(it=>{const cur=inventory[it.id];if(cur!=null)updates["inventory/"+it.id]=Math.max(0,cur-it.qty);});
  if(Object.keys(updates).length>0)db.ref().update(updates);
  Promise.all(ps).then(()=>{cart={};scheduledTime=null;especialesCart=[];notaMesa="";cerrarResumenBtn();showToast("✓ Pedido enviado — Mesa "+selectedTable);renderMesero();});
}

function saveEdit(){
  if(!editingOrderId)return;
  const entries=Object.entries(cart);if(entries.length===0)return;
  const items=entries.map(([id,c])=>{const m=getMeta(id);return{id,name:m?m.name:c.name,price:c.price||0,qty:c.qty,note:c.note||"",bev:isBev(id)};});
  // Actualizar todo el pedido de una sola vez
  const update={
    items:items,
    scheduledTime:scheduledTime||null,
    updatedAt:new Date().toISOString()
  };
  db.ref("orders/"+editingOrderId).update(update).then(()=>{
    showToast("✓ Pedido actualizado");
    cart={};editingOrderId=null;scheduledTime=null;especialesCart=[];
    renderMesero();
  }).catch(e=>{showToast("Error al actualizar: "+e.message,"#b3402f");});
}

  const stats={p:active.filter(o=>o.status==="pendiente").length,pp:active.filter(o=>o.status==="preparacion").length,l:active.filter(o=>o.status==="listo").length,t:active.filter(o=>timerInfo(o).level==="late").length};
  let h='<div class="kds-top"><div class="stats-row">';
  h+=`<div class="stat-pill"><div class="stat-num">${stats.p}</div><div class="stat-lbl">Pendientes</div></div>`;
  h+=`<div class="stat-pill"><div class="stat-num">${stats.pp}</div><div class="stat-lbl">En Prep.</div></div>`;
  h+=`<div class="stat-pill"><div class="stat-num">${stats.l}</div><div class="stat-lbl">Listos</div></div>`;

  h+='</div>';

  h+=`</div><div class="kanban${isBarra?" two":""}">`;
  cols.forEach(col=>{
    const colOrders=active.filter(o=>o.status===col.key).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
    h+=`<div><div class="k-col-title">${col.label} <span class="k-count">${colOrders.length}</span></div>`;
    if(colOrders.length===0)h+='<div class="empty-col">Sin órdenes</div>';
    colOrders.forEach(order=>{
      const t=timerInfo(order);
      const hora=new Date(order.createdAt).toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
      h+=`<div class="order-card ${t.level}"><div class="oc-bar"></div>`;
      h+=`<div class="oc-head"><span class="oc-mesa">Mesa ${order.table}</span><span class="oc-timer ${t.level==="programado"?"prog":t.level}">${fmtTimer(t)}</span></div>`;
      if(t.level==="programado")h+=`<div class="oc-prog">🕐 Para las ${order.scheduledTime}</div>`;
      h+=`<div class="oc-meta">Entró hace ${t.elapsed} min · ${hora}</div>`;
      if(order.notaMesa)h+=`<div style="background:#e9f0ea;border-radius:7px;padding:5px 9px;font-size:12px;color:var(--teal);font-weight:700;margin-bottom:6px;">📝 ${order.notaMesa}</div>`;
      (order.items||[]).forEach(it=>{h+=`<div class="oc-item"><b>${it.qty}×</b> ${it.name}</div>`;if(it.note)h+=`<div class="oc-note">↳ ${it.note}</div>`;});
      h+=`<div class="oc-actions">`;
      if(col.key==="pendiente"){h+=`<button class="btn-start" onclick="setStatus('${order.id}','preparacion')">Empezar</button><button class="btn-cancel" onclick="cancelarPedido('${order.id}')">Cancelar</button>`;}
      if(col.key==="preparacion")h+=`<button class="${isBarra?"btn-bev-ready":"btn-ready"}" onclick="setStatus('${order.id}','listo')">Listo</button>`;
      if(col.key==="listo")h+=`<button class="btn-deliver" onclick="setStatus('${order.id}','entregado')">Entregado ✓</button>`;
      h+=`<button class="btn-print-cmd" onclick="printComanda('${order.id}')">🖨</button>`;
      h+='</div></div>';
    });
    h+="</div>";
  });
  h+="</div>";
  document.getElementById(bodyId).innerHTML=h;
}

function renderAdmin(){
  if(detalleMesa!==null){renderDetalleMesa(detalleMesa);return;}
  const orders=ordersCache;
  const hoy=todayStr();
  const ordersHoy=orders.filter(o=>o.createdAt&&o.createdAt.startsWith(hoy));

function aplicarFiltro(){filtroDesde=document.getElementById("f-desde")?document.getElementById("f-desde").value:"";filtroHasta=document.getElementById("f-hasta")?document.getElementById("f-hasta").value:"";renderAdmin();}
function setAdminTab(t){adminTab=t;detalleMesa=null;renderAdmin();}
function verDetalle(mesa){detalleMesa=mesa;incluyePropina=true;metodoPago="efectivo";if(!window._preciosTemp)window._preciosTemp={};renderDetalleMesa(mesa);}
function cerrarDetalle(){detalleMesa=null;window._preciosTemp={};renderAdmin();}

async function renderDetalleMesa(mesa){

  if(!window._preciosTemp)window._preciosTemp={};
  const subtotal=(()=>{let total=0;mesaOrds.forEach(o=>{o.items.forEach(it=>{if(it.price!=null&&it.price>0){total+=it.price*it.qty;}else{const key=it.id+"_"+it.name;total+=(window._preciosTemp[key]?parseInt(window._preciosTemp[key])||0:0)*it.qty;}});});return total;})();
  const propina=incluyePropina?Math.round(subtotal*0.1):0;
  const total=subtotal+propina;

  const foodMap={},bevMap={};

  const renderItemRow=(it)=>{

async function cerrarMesaYImprimir(mesa,pago){
  await getNextFacturaNum();
  const mesaOrds=ordersCache.filter(o=>o.table===mesa&&o.status!=="entregado"&&o.status!=="cancelado");
  // Calcular subtotal y propina para guardar
  if(!window._preciosTemp)window._preciosTemp={};
  const subtotalMesa=mesaOrds.reduce((s,o)=>s+o.items.reduce((ss,it)=>{
    const p=it.price>0?it.price:(window._preciosTemp[it.id+"_"+it.name]||0);
    return ss+p*it.qty;
  },0),0);
  const propinaMesa=incluyePropina?Math.round(subtotalMesa*0.1):0;
  const updates={};
  mesaOrds.forEach(o=>{
    updates["orders/"+o.id+"/metodoPago"]=pago;
    updates["orders/"+o.id+"/propinaCobrada"]=propinaMesa;
    updates["orders/"+o.id+"/subtotalCobrado"]=subtotalMesa;
  });
  await db.ref().update(updates);
  printFactura();
}

function setPrecioTemp(key,val){if(!window._preciosTemp)window._preciosTemp={};window._preciosTemp[key]=parseInt(val)||0;renderDetalleMesa(detalleMesa);}
function saveInventory(e){e.preventDefault();const form=e.target;const updates={};MENU.forEach(group=>{group.items.forEach(item=>{const el=form.elements[item.id];if(el){const v=el.value.trim();updates["inventory/"+item.id]=v===""?null:parseInt(v)||0;}});});db.ref().update(updates).then(()=>showToast("✓ Inventario guardado"));}
function savePreciosVar(e){e.preventDefault();const form=e.target;const updates={};MENU.flatMap(g=>g.items).filter(i=>i.price===null).forEach(item=>{const el=form.elements[item.id];if(el){const v=el.value.trim();updates["precios_var/"+item.id]=v===""?null:parseInt(v)||null;}});db.ref().update(updates).then(()=>showToast("✓ Precios guardados"));}
function resetOrders(){if(!confirm("¿Borrar todos los pedidos?"))return;db.ref("orders").remove();}
</script>
